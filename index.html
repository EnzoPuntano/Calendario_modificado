<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Mágico 🌈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- ══════════════════════════════════════
         PANTALLA DE LOGIN
    ══════════════════════════════════════════ -->
    <div id="login-screen">
        <div id="login-card">
            <div id="login-icono">📅</div>
            <h2 id="login-titulo">Calendario</h2>
            <p id="login-sub">INGRESÁ TU NOMBRE PARA CONTINUAR</p>
            <input id="login-input" type="text" maxlength="20" placeholder="Tu nombre..." autocomplete="off"/>
            <p id="login-error"></p>
            <button id="login-btn">ENTRAR ▶</button>
        </div>
    </div>

    <!-- ══════════════════════════════════════
         CONTENIDO PRINCIPAL
    ══════════════════════════════════════════ -->
    <div id="main-wrapper" class="main-oculto">

    <div class="page-wrapper">

        <!-- Nubes decorativas (solo modo infantil) -->
        <div class="cloud cloud--1">☁️</div>
        <div class="cloud cloud--2">⛅</div>
        <div class="cloud cloud--3">☁️</div>

        <!-- Banner: saludo + switch de modo -->
        <div id="saludo-banner">
            <span id="saludo-texto">👋 Hola!</span>
            <button id="modo-switch-btn">
                <span id="modo-icon">🧒</span>
                <span id="modo-label">MODO INFANTIL</span>
            </button>
        </div>

        <!-- Título con mascota -->
        <div class="header">
            <!-- Mascota SVG animada -->
            <div class="mascota" id="mascota">
                <svg viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg" width="90">
                    <!-- Cuerpo -->
                    <ellipse cx="45" cy="72" rx="28" ry="20" fill="#86efac"/>
                    <!-- Manitos -->
                    <circle cx="18" cy="74" r="9" fill="#bbf7d0"/>
                    <circle cx="72" cy="74" r="9" fill="#bbf7d0"/>
                    <!-- Cabeza -->
                    <circle cx="45" cy="42" r="30" fill="#bbf7d0"/>
                    <!-- Orejas -->
                    <ellipse cx="18" cy="26" rx="10" ry="13" fill="#86efac"/>
                    <ellipse cx="72" cy="26" rx="10" ry="13" fill="#86efac"/>
                    <ellipse cx="18" cy="26" rx="6"  ry="9"  fill="#f9a8d4"/>
                    <ellipse cx="72" cy="26" rx="6"  ry="9"  fill="#f9a8d4"/>
                    <!-- Ojos -->
                    <g class="ojo" style="transform-origin:32px 40px">
                        <circle cx="32" cy="40" r="8"   fill="white"/>
                        <circle cx="33" cy="40" r="4.5" fill="#1e3a5f"/>
                        <circle cx="34" cy="38" r="1.8" fill="white"/>
                    </g>
                    <g class="ojo" style="transform-origin:58px 40px">
                        <circle cx="58" cy="40" r="8"   fill="white"/>
                        <circle cx="59" cy="40" r="4.5" fill="#1e3a5f"/>
                        <circle cx="60" cy="38" r="1.8" fill="white"/>
                    </g>
                    <!-- Nariz -->
                    <ellipse cx="45" cy="48" rx="3" ry="2" fill="#86efac"/>
                    <!-- Boca feliz -->
                    <path id="boca-mascota" d="M34 54 Q45 63 56 54" stroke="#1e3a5f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <!-- Mejillas -->
                    <ellipse cx="23" cy="50" rx="7"   ry="4.5" fill="#f9a8d4" opacity="0.55"/>
                    <ellipse cx="67" cy="50" rx="7"   ry="4.5" fill="#f9a8d4" opacity="0.55"/>
                    <!-- Estrellita -->
                    <text x="45" y="16" font-size="14" text-anchor="middle">⭐</text>
                </svg>
                <!-- Estrellas explosivas al navegar -->
                <div id="stars-container" class="stars-container"></div>
            </div>

            <div class="header__text">
                <h1 class="title">Calendario Mágico</h1>
                <p class="subtitle">✨ ¡Explorá los días del año!</p>
            </div>
        </div>

        <!-- Tarjeta del calendario -->
        <div class="calendar">

            <!-- Navegación mes/año -->
            <div class="calendar__info">
                <button class="calendar__prev" id="prev-month" aria-label="Mes anterior">&#9664;</button>
                <div class="calendar__month-year">
                    <div class="calendar__month" id="month">Marzo</div>
                    <div class="calendar__year"  id="year">2026</div>
                </div>
                <button class="calendar__next" id="next-month" aria-label="Mes siguiente">&#9654;</button>
            </div>

            <!-- Días de la semana -->
            <div class="calendar-week">
                <div class="calendar__day">Lun</div>
                <div class="calendar__day">Mar</div>
                <div class="calendar__day">Mié</div>
                <div class="calendar__day">Jue</div>
                <div class="calendar__day">Vie</div>
                <div class="calendar__day">Sáb</div>
                <div class="calendar__day">Dom</div>
            </div>

            <!-- Grilla de días (generada por JS) -->
            <div class="calendar-grid" id="calendar-grid"></div>

            <!-- Leyenda -->
            <div class="calendar__legend">
                <div class="legend__item">
                    <span class="legend__dot legend__dot--today"></span>
                    <span>Hoy</span>
                </div>
                <div class="legend__item">
                    <span class="legend__dot legend__dot--holiday"></span>
                    <span>Feriado nacional</span>
                </div>
                <div class="legend__item">
                    <span class="legend__dot legend__dot--holiday-movil"></span>
                    <span>Feriado inamovible</span>
                </div>
            </div>

        </div>

        <!-- Tooltip para feriados -->
        <div class="tooltip" id="tooltip"></div>

    </div>

    </div><!-- /main-wrapper -->

    <script src="./js/script.js"></script>
</body>
</html>
